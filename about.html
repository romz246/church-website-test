<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>The Six Roads Seventh-Day Adventist Church | About Us</title>
		<!-- Prevent flash on load -->
		<script>
			(() => {
				const saved = localStorage.getItem("theme");
				if (saved === "light" || saved === "dark") {
					document.documentElement.setAttribute("data-theme", saved);
				} else {
					const systemDark = window.matchMedia(
						"(prefers-color-scheme: dark)",
					).matches;
					document.documentElement.setAttribute(
						"data-theme",
						systemDark ? "dark" : "light",
					);
				}
			})();
		</script>

		<link rel="stylesheet" href="./css/main-styles.css" />
		<link rel="stylesheet" href="./css/about.css" />
		<script src="./js/main-script.js" defer></script>
	</head>
	<body>
		<div class="container">
			<header class="main-header">
				<div class="main-header-logo-container">
					<a href="index.html" class="main-header-logo"
						><img
							src="./imgs/symbol/symbol_square-transparent.png"
							width="80"
							alt="sda logo"
						/>The Six Roads Seventh-Day Adventist Church</a
					>
				</div>

				<nav class="nav">

						<li><a href="events.html">Events</a></li>

				<button
					id="theme-toggle"
					aria-label="Toggle dark mode"

				>

						width="32"
						height="32"
					>
						<circle cx="12" cy="12" r="5" fill="#FBBF24" />
						<g stroke="#FBBF24" stroke-width="2">
							<line x1="12" y1="1" x2="12" y2="4" />
							<line x1="12" y1="20" x2="12" y2="23" />
							<line x1="1" y1="12" x2="4" y2="12" />
							<line x1="20" y1="12" x2="23" y2="12" />
							<line x1="4" y1="4" x2="6" y2="6" />
							<line x1="18" y1="18" x2="20" y2="20" />
							<line x1="4" y1="20" x2="6" y2="18" />
							<line x1="18" y1="6" x2="20" y2="4" />
						</g>
					</svg>

					<!-- Moon -->
					<svg
						class="icon moon"
						xmlns="http://www.w3.org/2000/svg"
						viewBox="0 0 24 24"
						width="32"
						height="32"
					>
						<path
							fill="#A5B4FC"
							d="M21 12.79A9 9 0 0111.21 3a7 7 0 109.79 9.79z"
						/>
					</svg>
				</button>

				<button
					class="hamburger-menu-btn"
					id="hamburger-menu-btn"
					aria-controls="primary-navigation"
					aria-expanded="false"
				>
					<svg
						fill="var(--button-color)"
						class="hamburger"
						viewBox="0 0 100 100"
						width="35"
					>
						<rect
							class="line top"
							width="80"
							height="10"
							x="10"
							y="25"
							rx="5"
						></rect>
						<rect
							class="line middle"
							width="80"
							height="10"
							x="10"
							y="45"
							rx="5"
						></rect>
						<rect
							class="line bottom"
							width="80"

							x="10"
							y="65"

						></rect>
					</svg>
				</button>
